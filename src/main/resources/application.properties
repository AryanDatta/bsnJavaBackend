server.port=${PORT:8080}

spring.application.name=bsnJavaBackend

spring.mongodb.uri=

# Mail (password reset OTP) - set MAIL_USERNAME + MAIL_PASSWORD (Gmail app password, NO spaces) in prod
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
# Fail fast instead of hanging the API forever when SMTP is unreachable
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Razorpay (agent marketplace) - set these as environment variables in prod
razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
# Base URL used to build a mock deployment endpoint for purchased agents
bsn.agents.deploy-base-url=${AGENTS_DEPLOY_BASE_URL:https://agents.bsn.ai}

# PayPal.me (manual) checkout for agent purchases
paypal.me-link=${PAYPAL_ME_LINK:https://paypal.me/Datta924}
# currency code appended to the PayPal.me amount (e.g. 4999INR). Leave blank to use the account default.
paypal.me-currency=${PAYPAL_ME_CURRENCY:INR}